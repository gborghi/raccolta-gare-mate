name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Restore Quartz plugins (from quartz.lock.json)
        run: npx quartz plugin restore
      - name: Build Quartz
        run: npx quartz build
        env:
          # og-image (satori) + note-properties over ~19k pages exceeds Node's default
          # heap on the 16 GB GitHub runner; raise the old-space limit to avoid OOM.
          NODE_OPTIONS: --max-old-space-size=13312
      - name: Connect concept graph (co-occurrence links)
        run: node concept_cooccurrence.mjs
      - name: Shrink heavy assets for low-RAM mobile
        run: node shrink_build.mjs
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
