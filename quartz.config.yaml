# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: Raccolta Gare di Matematica
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: true
  analytics: null
  locale: it-IT
  baseUrl: gborghi.github.io/raccolta-gare-mate
  ignorePatterns:
    - private
    - templates
    - .obsidian
    - _attachments
  defaultDateType: modified
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: Fraunces
      body: Inter
      code: JetBrains Mono
    colors:
      lightMode:
        light: "#f7faf7"
        lightgray: "#e2e8e3"
        gray: "#aeb8b0"
        darkgray: "#454b46"
        dark: "#1e2620"
        secondary: "#1d5c44"
        tertiary: "#6a9a7b"
        highlight: rgba(29, 92, 68, 0.12)
        textHighlight: "#f5d90a88"
      darkMode:
        light: "#141a16"
        lightgray: "#2f3a33"
        gray: "#5c6b61"
        darkgray: "#d4dad6"
        dark: "#e8ece9"
        secondary: "#5fbf8a"
        tertiary: "#9ccdb0"
        highlight: rgba(95, 191, 138, 0.12)
        textHighlight: "#b3aa0288"
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/citations
    enabled: false
  - source: github:quartz-community/hard-line-breaks
    enabled: false
  - source: github:quartz-community/ox-hugo
    enabled: false
  - source: github:quartz-community/roam
    enabled: false
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/explicit-publish
    enabled: false
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: true
  - source: github:quartz-community/cname
    enabled: true
  - source: github:quartz-community/canvas-page
    enabled: false
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    options:
      # Exclude the Quesiti folder (~19,356 entries) from the file tree — it would build
      # ~19k DOM nodes on every load (the heaviest client cost). Browse quesiti via /cerca.
      # Keep the default `tags` exclusion. (filterFn is serialized to the client as a
      # string and re-hydrated there, so a string body works from YAML.)
      filterFn: "(node) => node.slugSegment !== 'tags' && node.slugSegment !== 'Quesiti'"
    layout:
      position: left
      priority: 50
  # forked graph plugin (gborghi/graph): on-demand local graph + node cap + concept-only
  # global map. See plugins/graph (separate repo) for the source.
  - source: github:gborghi/graph
    enabled: true
    options:
      localGraph:
        maxNodes: 220
      globalGraph:
        includeFolders:
          - Topics
          - Methods
          - Skills
          - Clusters
    layout:
      position: right
      priority: 10
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 30
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
  - source: github:quartz-community/tag-list
    enabled: false
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: left
      priority: 35
      group: toolbar
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/comments
    enabled: false
  - source: github:quartz-community/footer
    enabled: true
    options:
      links: {}
  - source: github:quartz-community/recent-notes
    enabled: false
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: github:quartz-community/bases-page
    enabled: false
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - competition
        - year
        - level
        - country
        - modalita
        - topics
        - skills
        - tags
      excludedProperties: []
      hidePropertiesView: false
      delimiters: "---"
      language: yaml
    order: 5
    layout:
      position: beforeBody
      priority: 15
      display: all
  - source: github:quartz-community/encrypted-pages
    enabled: false
  - source: github:quartz-community/stacked-pages
    enabled: false
layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - reader-mode
      positions:
        right: []
    tag:
      exclude:
        - reader-mode
      positions:
        right: []
